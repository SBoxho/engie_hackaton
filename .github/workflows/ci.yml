name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests and app smoke check
    runs-on: ubuntu-latest
    env:
      APP_MODE: demo
      DEMO_ALLOW_EXTERNAL_API: "0"
      PYTHONUTF8: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Compile Python modules
        run: python -m compileall app src scripts

      - name: Streamlit demo-mode page smoke tests
        run: |
          python - <<'PY'
          import os
          from unittest.mock import patch

          from streamlit.testing.v1 import AppTest

          if os.environ.get("APP_MODE") != "demo":
              raise SystemExit("CI smoke tests must run with APP_MODE=demo")
          if os.environ.get("DEMO_ALLOW_EXTERNAL_API") != "0":
              raise SystemExit("CI smoke tests must keep DEMO_ALLOW_EXTERNAL_API=0")

          def blocked_network(*args, **kwargs):
              raise AssertionError("Unexpected network call while APP_MODE=demo and DEMO_ALLOW_EXTERNAL_API=0")

          pages = [
              (
                  "Homepage",
                  "app/main.py",
                  [
                      "Observe, understand, act",
                      "Why it matters",
                      "RTE / ODRÉ",
                      "Open-Meteo",
                      "ADEME",
                      "data.gouv.fr",
                      "Built for the hackathon",
                      "Demo data mode",
                  ],
              ),
              (
                  "Forecast cockpit",
                  "app/pages/2_forecast.py",
                  ["Explainable Forecast Cockpit", "Actuals versus AI forecast", "Experimental model status", "Demo data mode"],
              ),
              (
                  "Explainability",
                  "app/pages/3_explainability.py",
                  ["Forecast explainability", "Grouped drivers", "Technical evidence", "Demo data mode"],
              ),
              (
                  "Demand shifting simulator",
                  "app/pages/7_demand_shifting_simulator.py",
                  ["Can you flatten the peak?", "Scoreboard", "Educational challenge", "Demo data mode"],
              ),
          ]

          with patch("requests.sessions.Session.request", side_effect=blocked_network), patch(
              "requests.api.request", side_effect=blocked_network
          ):
              for label, path, required_phrases in pages:
                  app = AppTest.from_file(path)
                  app.run(timeout=45)

                  if app.exception:
                      for exception in app.exception:
                          print(exception.value)
                      raise SystemExit(f"{label} raised Streamlit exceptions")

                  text = "\n".join(
                      str(element.value)
                      for collection in (app.title, app.header, app.subheader, app.markdown, app.caption, app.info, app.warning)
                      for element in collection
                  )
                  missing = [phrase for phrase in required_phrases if phrase not in text]
                  if missing:
                      raise SystemExit(f"{label} missing demo smoke copy: {missing}")

          print("Demo-mode Streamlit smoke tests passed without network calls.")
          PY

      - name: Run tests
        run: python -m pytest
